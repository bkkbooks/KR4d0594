body:
  text: 石門集卷三明梁寅撰樂府辭玉階怨獨步玉階靜飛鼠掠紅櫳月斜萬年樹露寒金井桐别殿笙歌合宴樂猶未終團扇且棄置夕氣凉轉添流螢㸃魚鑰隕葉近蝦簾羅衣舊恩賜不令珠淚霑短歌行今日燕胥樂如之何我醑惟㫖我殽孔嘉皎皎熙陽灼灼芳華爰有鳴禽集於修柯我觴我友載衎載和歡日苦少戚日苦多伊其相樂毋耋之嗟木可重蘖川無回波人匪金石其生有涯鼓瑟鼓琴或詠或歌樂以無耽永矢弗過采蓮曲豔粧二八女嬌歌采蓮曲停橈江上郎隔花蕩心目采蓮莫采花采蓮莫采葉要知心最苦緑房為君折花多照水紅葉多照水青願及秋未老為花惜芳馨折花折翠莖常恐輕斷脆但使藕常在年年花相似鳯笙曲梁有江南弄七曲鳯笙曲其一也碧玉為管金為簧娑娑綵翼欲回翔雕龍合殿春日長春日長鳯和鳴六氣順三階平怨歌行二首雲母屏風零露潔蒲萄錦衾殘月光羞看繡帳雙鴛帶徒費薰衣百和香寶叉頭上千黃金可憐墮井無復尋情如秋嶺朝朝淡愁似春江日日深西門行出西門安所逢所逢皆少年稀見頭白翁人生如春花朝競陽艷夕空叢百年流光能幾何幼而蚩蚩老歎蹉跎歡日苦少愁日苦多勸君美酒聽我歌寧為貧賤之娛樂無羡得意之奔波車遙遙車遙遙江上路知君心與江水東水可停流車不駐出門望風沙碧雲在天涯少年萬里志那思早還家落花紛紛霑綺疏春來春去傷離居丈夫官慕執金吾敢云富貴非良圗托身自誤不自怨惟願羊腸九折無摧車東武吟戚戚復戚戚丈夫有行役行役今安之萬里適京國隋珠耀明月和璧誇懸黎及時不自獻明君焉得知美人倚繡户牽衣子毋去長安多風塵能令素衣汚餔糜共朝昏冠珮何足云吾行且復止感爾意良勤荆州歌䕫州六舸下揚州如雷疊鼓春江頭花開滿城不少留瞿塘風波似翻海朝朝出望為郎愁上之回海波如白山三山不可到凌雲臺觀思仙人金輿逺出回中道回中道何逶迤朝旭照黃屋靈飈捲鸞旗青鳥西來集行殿王母雲軿初降時碧藕味逾蜜氷桃甘若飴笑飲九霞觴侍女皆瑤姬從臣羅拜稱萬嵗終不學穆天子八駿無停轡還宫靜處仙自來願與軒轅同久視公莫舞即鴻門舞劍曲東兵西來入秦關薄天雄氣摧南山秦民夾道觀隆準降王俯首戈塵間戈如林士如虎黃河倒流沃焦土秦宫白晝千門開關兵夜嚴勢連堵月落千騎驚蕭蕭聞楚兵鳴鏑交馳天狗墜重瞳怒叱天柱傾平明駐關中旌旗耀日舒長虹置酒交歡誰其雌雄胡為拔劒以决起使一夫睥聣而相攻劍光燦兮秋霜橫袖展翮兮隂風生孤㹠咋虎不自量徒以意氣相憑陵相憑陵一何愚空中竒氣成五采但見雲龍矯矯行天衢大堤曲大堤女兒顔如花穠粧綺服踏江沙折花鬭草歸來倦小樓閒坐彈琵琶玉叉金蟬雲鬟整江水照見花枝影舟中少年久凝望如飲春醪昏不醒焉知美人心險若穽與機令爾黃金一朝揮魚向深淵藏鳥逐層雲飛勸爾慎勿癡且惑縱有多金不如歸飛龍篇西登崆峒如觀五城雲霞埀彩日月互明𤣥鶴繞樹青鹿長生翹慕軒皇問道廣成至人不私靈符親授熟爾心田窒爾情竇駕風乘霓八表騰驟人寰粃糠長樂𤣥囿五言律詩旅舍寥濶山林跡凄凉江海情巴歌從客好楚服為人輕把劍秋風起憂時白髮生黃金雖所貴未敢論縱橫程止善以廣東帥府奉差還省親浙東楚楚江南士翩翩幕下郎公車煩奏報分閫接輝光魚稻三吳美雲山百粵長東還慰親意指日拜髙堂鈐北和答袁子敬夫子荆揚彥龍門早欲攀髙名輝北斗雄氣並南山鐘應天霜吼舟因峽浪還蓬萊獻三賦他日動天顔二月望郡城作楚郊春已半出郭少紛華雨長閒門草烟迷廢苑花干戈違古俗耕鑿羡人家吾異青門隱也應歸種瓜對雨飛雨山棚爽繁雲竹巷迷翠藤低拂石黃葉亂霑泥樹杪盤飢鶻牆根立小雞園夫桔橰廢新水滿青畦宗海上人新住仙姑院寄贈閬苑仙姑境祇園珠樹林炎岡焚白玉淨地待黃金詩裏烟霞色軒中水月心髙栖憶支遁遙睇碧山岑贈醫士蕭敬則海上安期子仙風可獨攀斸苓春雨裏種杏碧雲間一竹看龍化千峰與鶴還神功比卿相何必羡朝班五言長律寄阮謙仲阮君江海士不減嗣宗賢酒共名流飲詩從野客傳尋山經楚甸踏雪上吳􅊑急景心常惜冥搜思獨𤣥其詩集曰客子光隂圖成輞川上花憶浣溪邊窗户山擎月樓臺樹接天珍藏太史録剩集小山篇何日參佳論臨流思渺然普元禮御史遷浙省都事奉餞帝命均勞逸天工贊紀綱渥恩來鳯沼吉日動烏檣位應郎官宿威餘御史霜諸曹資倡率上相待繩匡正色吳山悄清懷浙水長當為鮑司𨽻行召董賢良凛凛科名重振振士氣揚明年楚江上霄漢想鵷行建業為友生徐元明題驄馬圗西域青驄馬名因畫史傳一龍方挺出八駿敢爭先曉日明金轡春雲覆錦韀河源隨蹀躞閶闔望蜿蜒迥立梧桐外長嘶苜蓿前無雙空冀北敵萬踏燕然留影詞人羡捐金貴介憐他年按圗索天路復翻翩易子翬自建業還上髙益樂贈别我每懷空谷君先賦式微好風催去槳凉月夢庭闈柱史能相問山人苦勸歸久閒松桂室將理薜蘿衣豹變中林隱鴻期九野飛韋編常自理朱紱豈終違方篤鄉鄰好那憂㑹合稀雲栖如可覔他日扣巖扉賦五音石魚石魚者雲山寺之故物雪印致之天寧因觀而賦之瑰石含幽響神魚入巧裁揚鬐方丈室驤首雨花臺音逐神光動鱗隨日影開錦鯨同詭狀桐鯉愧凡材泉吼松邊應僮聞竹下回㸃頭曾悟法燒劫不成灰淪棄經風雨遷移出草萊熱生敲處火潤帶卧時苔夏后璜今復周王鼓未摧希聲洗煩慮日欲上方來題黃孟節峽東草堂市逈茅堂靜岡分玉峽回藤簷雲氣逼甕牖旭光來稚栁依沙種幽花瞰水栽鳬鷖時狎近豺虎息驚猜山靄霏霏逺汀雲漾漾開遊絲當散帙啼鳥勸持杯商舶從紛若橈歌亦快哉名同浣溪叟暫屈濟時才贈李以洪歸豫章吉日櫂謳發蘼蕪江上青縱魚躍氷渚思雁度烟汀歸夢波能越離歌酒暫停逺岑朝在目新月夕揚舲重訪神君館還經孺子亭辭髙誇白雪人去歎晨星舊宅花留樹荒阡蕙薦馨啼鶯候來客春暮許同聽五言絶句初夏十絶夜雨響幽澗曉雲歸逺山隂晴識天意一為破愁顔踏沙逢斷徑坐石看浮槎魚逐新生水蜂尋未落花水稻苗初緑畦桑葉漸稠羡人耕鑿好寬我亂離憂樹暗雲更深鳥啼春已去多謝桃源人能留逺人住傳聞渝水上蔽日甲兵塵野戰哀田叟山行泣婦人風藤搖曲巷烟栁暗長渠飢鶻無時下浮鷗却自如莫年生計違頭白獨如期爭似兒童日漁樵逐隊嬉久客疏慵慣渾忘世俗嘲詩因臨水就書為看雲拋經嵗離故園青林思飛繞舊松長更髙新竹生漸小薜荔巖前老蘼蕪江上多吳船擬重泛閒聽越人歌趙伯友姜叔謙同逰紫霄觀見示佳咏因屬和琪樹方壺秀芝草𤣥洲春羽人愛林卧不管海揚塵昔聞雲中仙遁迹人間世青松將十圍蒼鹿亦千嵗餐霞固有術烹石諒非難何如坎離媾方寸成金丹貞士不可見或從林下逢暫即松筠室聊怡氷雪容碧桃天上樹青澗石邊栽世每紛紛異花猶嵗嵗開手弄紫藟芳搴衣隂洞口九節蒲可尋如瓜棗當剖髙吟水木淨逸思風雲驟知有滄洲期意得還獨笑為黃仲尹題梅四絶孤山夕雲凍皓鶴返林廬參差破瓊蕊正是雪飛初珠宫萬姝麗繽紛朝紫皇月明瑶珥冷風細縞衣香蜿蟺雙蒼龍石潭下無底時時戲明珠夜光照寒水霜白玉堂砌烏啼錦樹枝小兒誇解笛莫向月中吹石門集卷三
