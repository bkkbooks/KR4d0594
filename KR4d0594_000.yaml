body:
  text: 石門集目録别集類四元卷一古賦卷二五言古詩歌行卷三樂府辭五言律詩五言絶句卷四七言律詩卷五七言拗體七言長律七言絶句卷六記卷七序臣等謹案石門集七卷明梁寅撰寅字孟敬新喻人世業農寅獨自力於學淹貫五經百氏元末辟集慶路儒學訓導以親老乞歸隱居教授明洪武初徵修禮書寅年已六十餘書成將授官稱老病辭還結廬石門山四方士多從學稱為梁五經又稱石門先生事蹟具明史儒林傳寅平生著述甚富於易書詩春秋周禮禮記皆有訓釋其史學則䇿要史斷等書雜著則耄言論林搜古集格物編等書不下數千卷今俱已散佚惟詩文集僅存而世所行又有二本一即此本乃馬氏玲瓏山館所抄一為新喻知縣崇安暨用其所刋本分為十卷與此本稍有詳略而大致不甚相逺寅邃於經術故其文皆能原本注疏經義紛綸頗為醇雅有法詩亦舂容淡逺規仿陶韋殊無塵俗之氣惟河源一記過信傳聞之說其失正與潘昻霄相同書生拘墟之見承訛襲謬無足多責固存而不論焉可矣乾隆四十三年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
