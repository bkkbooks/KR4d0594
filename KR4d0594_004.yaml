  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0594_WYG_004-1a, image: WYG1222/WYG1222-0638a.png}
body:
  text: 石門集巻四明梁寅撰七言律詩送江西省員外郎納文璨赴四川省理問豫章城外發春帆西望岷峨落日酣故國蠶叢隨地迥浮雲鳥道與天參政行定布秋官令賦就多逢蜀客談他日繡衣歸闕下還因鴻雁憶江南贈唐伯恂應試山東明經應詔唐公子價比璵璠英妙年長安躍馬志千里東魯獲麟書一編路入淮河青樹裏家隣海岱白雲邊郡國薦書多秀彦漢廷惟愛董生賢題常檢校執中琴鶴軒華省歸来栖莫鵶層軒開處對明霞竹邊琴鶴心如水郭裏林塘客是家碧玉調髙風自起𤣥裳舞罷月初斜晝閒更喜詩清絶白石蒼苔松正花次韻題姜叔用山中書樓飛樓髙出對山㘭千丈瑤林聳翠梢桂花結得月中實松葉構成雲裏巢散帙羣鵶繞茅屋鈎簾一鶴下江郊山中習氣愛淳樸髙尚何妨世俗嘲重到澹溪和答姜叔徳侯門還似野人廬故友時来下澤車桃李庭墻花發後蘭苕洲渚水生初揮毫緩飲山亭酒移炬頻窺竹閣書今日風光異前日好將詞賦惜春餘澹溪留别熊孟和武陽渡口與君别澹水溪頭重見君客裏十年如昨日世間千態祇浮雲荒沙病馬春仍怯幽館啼鶯晝共聞明日臨流忍分袂石橋烟栁翠紛紛贈裴憲史之武昌觀風曾従使君車改調重来憲府書宿槳暮吟彭蠡雁香秔朝飯武昌魚九秋天濶鷹鸇迅七澤霜嚴草木疎幕下羨君多意氣竒才何止百硨磲送洞陽楊鍊師東逰水洞山人泛海槎東逰聊看赤城霞仙衣新理薜蘿蔓野飯兼飡松樹花自向名山窺玉簡羞干卿相論丹砂錢塘月下西飛鶴定有尺書先報家送忍上人之廬山蘺蘅洲渚綠迷沙振策行尋江上石鏡錦屏詩入夢松林蓮社客為家燈前暮雨飛青崦鉢裏春泉帶落花幽賞重期定何處鍾山秋日詠烟霞題句容王氏西齋句曲山髙雲木齊逸人結屋山之西凉風為掃堦前葉落日留光林外溪書滿松床兒子誦詩鐫石壁逺人題好招車馬塵中士来共煙霞幽處栖贈沈茂才歸池陽沈生三十慕班揚袖裏驪珠吐夜光未題天上仙郎籍猶滯江南古帝鄉五月凉風吹白袷一川飛雨蕩輕航歸拜髙堂應最樂松花山醖滿筵香送李儀伯御史之西臺鍾阜石城嗟久淹秦山渭水入遙瞻郵程漸與江湖異殊俗喜聞官吏亷雲浪魚龍三月暖霜天鷹隼九秋嚴明年簪筆明光殿褒擢重期聖澤霑送李好古御史秦淮埀栁翠毿毿烏府先生發去驂路入雲山函谷裏夢懐雪屋大江南君初生時以雪水浴之名之曰浴雪漢官執法時流羨唐代遺蹤野老談應念西人久凋瘵飛章先看斥姦貪番陽朱仲潛赴廣東學正贈别秋風浩蕩掃蠻烟海月偏宜下瀨船北闕尚遲宣室召南交暫借廣文氈檳榔日食諳殊俗荔子園租當俸錢况說伏波能薦士長裾誰得似君賢聽秋聲軒為李叔端賦繡衣公子李賢良愛聽秋聲山水房半夜天風林欲雨一庭白月户明霜書看巻裏蠅頭字燈吐窗間螢爝光想惜流年慕勲業寜無詞賦似歐陽張元相學正歸上饒贈别倦客方歌歸去来君歸先為酌離杯鳯凰臺下帆朝發龍虎山前雲莫迴中嵗一官淹澤國明年三賦獻蓬莱鳴珂定按䕫龍步已見文星近上台初至錢塘九市通衢萬栁青栁邊車騎霧㝠㝠浙江水裊羅衣帶天目山開紺畫屏游女競誇新服玩遺民猶詫小朝廷白衣太史徒多感祇擬重増山水經登吳山城繞青峰錦繡迴仙樓十二競崔嵬雲飛滄海山無盡潮撼長江雨併来吳相忠魂祠宇在宋皇行殿梵宫開東南都㑹金城廢竟日湖船絲竹哀小留豫章袁尚志歸自浙右得劉伯温書併寄吳興温國寳筆十枚感其逺貺一詩奉寄伯温名基處州青田人舉進士為髙安丞再遷江浙儒學副提舉江西十載誦君詩一見錢塘如故知躭學自嫌科第早論文何讓古人為湖州兔穎刀鋒銳浙水魚箋錦字竒珍贈千金意千里長因明月動幽思太平觀靈樞堂有軒臨池扁曰山水間因訪曾鍊師留宿賦之道人住在小𤣥洲山水之間庭户幽松掛片雲招宿鶴池開半月隠靈蚪仙書待寫榴皮字燕坐真乘蓮葉舟為論先天過夜半知師心與太虚游送清江劉立愛赴柱陽學錄千丈孤城環萬山新除學錄小官閒郡侯拜朔惟陪禮弟子鳴絃長掩闗燄燄文星南斗下迢迢桂水白雲間竒才好進安邊策早從樓船定八蠻至正庚寅嵗分宜丞舒君尚翁浚治章湖寓宿白斜巡檢署題詩壁間尚翁乙酉進士予故人也嵗丙申經過白斜覩遺迹嘉循政因續其韻畫虎墻摧土覆階故侯題句昔曾来政稱循吏湖再闢力比巨靈山自開環砦危峰森似㦸照人寒水淨于苔居民捴愛甘棠館嘉樹何妨為更栽岷同和舒君射策黄金階匹馬還向山邑来閭里不忘朱邑治湖陂重喜白公開獨憐廢署飄黄葉誰向荒畦墾綠苔猶憶番陽韓太守曾將桑柘繞庭栽參政韓鏞伯髙為饒守郡治花木悉抜去植以桑柘丁酉嵗正月四日雪白頭遭亂逺江城寄宿深山嵗又更雪裏人家荒野色天涯親友暮年情山魈夜應猿猱響樵子晨衝虎豹行草笠棕衣任来往隂崖何處覔黄精寄黄將軍大章千里江湖羽檄傳著鞭方看祖君先連營白斾風雲上為國丹心日月邊諸客登樓多暇日三農在野慶豐年戎機須自儒冠出未數功臣衛霍賢憶訪轅門雪後行如今林壑漸秋生狂夫幾日渾欲舞涼雨千村將洗兵翠羽文犀開貢獻山車銀瓮報清平凌霄義氣看能事老向漁樵也自榮次韻姜叔徳冬雪黄雲羃羃四山圍翻海隂風撼竹扉珠向美人簾下撒花當歸客馬前飛夜窗銷燭增寒氣曉艇掀篷失翠微豪俊不誇金帳飲新詩聨璧自生輝出豫章城南寄友生李用巽兄弟翠谷環居似太行謝家庭樹玉生光題詩晚集松蘿逕共被秋眠山水房城郭樓臺堪悵歎江湖風雪苦凄凉雁行霄漢他年事寧厭雲林白日長鳯洲上同劉仲修到郡城雲中城郭似蓬莱叠嶼重洲綠水迴寺近松闗微雨送津浮蘭艇好風催雞豚荒逕人烟僻鸛鶴平林畫障開正待幽尋遣羈思青鞵黄帽喜追陪仲修宅春日分韻得園字疎雨澹澹煙沙村花邊石梁通小園荻芽水生魚欲上松林日暮鵶争喧春醪傾玉渾易醉世事翻雲誰與論羣俊題詩擬陶謝且同燒燭坐東軒次韻送文彦髙歸西昌日照江頭花片肥春香冉冉襲行衣蘭苕雨過棹初發楊栁月圎人定歸金鳯晴沙時入夢白鷗芳渚坐忘機春深為想重来日桐葉清隂鶯亂啼社日去年鈐北愁多難今嵗城南将過春為客偶同王謝燕歸農猶愧葛懐民杏桃烟際紅相向桑柘雨中青未勻童稚莫嗔無社假好題新句答芳辰送上髙易季文之洪君将鼓枻向洪都我值秋風病偶蘇髙士亭臺勞逺夢仙人城郭阻同趨雲迷紫氣蛟龍蟄風激黄沙雁鶩呼大郡衣冠煩問訊何人還憶楚狂夫和酬黄吾雲江上雲連長短亭别懐如水注東溟早期劍佩朝雙闕又見文章似六經為國丹心朝捧日憂時白髪夜觀星銀河漾漾青峰隔遙羨秋光生户庭傅元賓還理故業歸来買犢擬躬耕親友聨居摠弟兄金谷舊時華屋廢浣溪来嵗草堂成旌旗千戍隂雲接舟楫三江白浪驚好理荷衣翫泉石深栖終不負儒生次韻酬黎以徳銀河斜界樹參天為憶幽人思渺然亥市塵囂迂竹逕午橋烟雨傍溪船呼燈教子栖鴉後倚杖看山野鶴邊但得文章攀屈宋何須重賦逺逰篇次韻酬習君謙新詩金玉響泠然喜聽琴中幽澗泉卧病猿猱青嶂下夢懐鸞鳯碧梧邊抛書悵望秋風逕倚杖踟蹰夕照天最憶習池山水勝故家人物信多賢山中秋夜夜對千峰秋氣新蕭條巖壑一閒身松林虎出時窺犬茅屋螢飛偏近人傍月把書憐稚子臨風吹笛羨南隣栖烏應怯梧桐冷不斷悲啼欲嚮晨贈易自然禱雨秋郊旱魃晝人立野老哀吟如雁聲龍工戢翼潭水落畢星藏光溪月明霹靂棗枝天将令太乙瑤壇𤣥女旌澍雨千村感誰賜神功云是易仙卿生日和醻黎賓賢黄塵恐涴黒貂裘閭里聊為馬少逰五色文章輝北斗羣英冠冕重南州豹藏𤣥谷千峰霧魚戀蒼江萬里流好繼前人題桂籍明年仙闕步髙秋新詩多謝祝長年空谷難来白馬顛自笑少陵真野老敢誇方朔是天仙松醪思共匏尊酌竹簡期觀石室編良㑹不嫌溪路逺小窗月夕聽山泉病起言懐三首卧病兼旬人事稀草堂秋樹掛晴暉隣雞乍警飢狐出林鳥無聲獨鶴歸風裏抛書因力倦雲中飡石與心違晚吟尤愛松溪靜淺水菰蒋映釣磯落落朝霞紅冠林紛紛山靄翠迷岑一川灌莽人分牧千丈石潭龍或吟烈日每愁看赤地𤣥雲即待起層隂眼中百物嗟凋耗多難誰知天地心山中日習惟疎懶秋草連扉客少過灌圃何因分逺澗入林偏厭長埀蘿移居瞰水心期遂携友窺巖興每多喜似閒僧思方寂楚山千嶂湧蒼波送本州判官移宰分宜銀河玉露曉天低翠峽黄郊去馬嘶上佐三年官正滿明珠百斛句新題鈐岡草木霜前隕縣郭䲭鵶雨裏啼千室弦歌待明府今人能政古人齊和醻仲修聞道逍遙林澗居移家仍載五車書擬耕鄭谷買黄犢那憶楚江多白魚柿葉遍書雲冉冉山隂坐對樹疎疎寓舎遥知先種竹何由塵土上衣裾和酬伍仲逺君才髙李可為徒長愛青絲繫玉壺醉折公卿多慷慨狂歌閭巷足驩娱黄金易得隨時散白璧非輕待價沽林下幽人感珍贈陽春端與俗音殊夢中得詩二聨覺而足之坐對南山鳴鳥稀松床書帙逗晴暉閉門無客論朝市開口恐人談是非雨後翠生飛燕羽花時紅擁釣魚磯醴溪春色濃于酒莫遣風烟與願違何伯遜見訪贈詩和答百里来尋水竹村鵲聲將喜報衡門山中白石聊同煮世上黄金未足論詩似隂何思更苦跡追園綺道尤尊貧家無物堪娱客一樹寒梅雪映軒君謙遣其子溥来學因寄詩和答名士何妨澗谷栖丹崖髙聳白雲低東風鶯繞千章木春水魚逰九曲溪教子早年窺汗簡従師窮巷樂羮藜茅堂日候巾車到花徧山園草滿畦和酬簡九成蜀郡名家賢俊多君才自合置鑾坡雲門琴瑟絃須練𤣥圃球琳石可磨雨過春洲采芳杜月明山舎對埀蘿相思日夕期相見共樂時清漸息戈再和酬簡明元見説林塘詩思多竹連幽嶼草連坡晴雲過眼白衣化野水照人青鏡磨百畝山田宜稻秫千章岑木愛松蘿論交莫景相期逺迴日煩君借魯戈和酬舒元珍日對黄峰心自清瑤琴能瀉澗泉聲不誇絳闕仙曹貴却憶雲山樵叟名琥珀瓊脂崕上出珊瑚玉樹海中生元輿已羨才華異好騁雄辭賦兩京彭伯塤新婚籛鏗孫子有仙才雲引簫聲起鳯臺紫綺應従天上織綠羅新向月中裁良宵絳蠟銀屏暖吉日瓊筵畫障開金榜巍科見先兆早将詞賦獻蓬莱癸夘臘月雷臘月頻聞殷殷雷荒村晝雨似浮埃石潭驟起蛟龍蟄松谷遙驚鸛鶴迴覆壠薺菘青更嫩出墻梅李白争開雖愁瘴癘乘時作先喜春從天上来偶成山翁自愛緼袍寛白髪尤宜製鶡冠蓬巷三年貧不病竹書一篋老仍看䲭鵶亂噪丹楓晚鸞鳯稀来翠柏寒渺渺江湖交友絶空聞渤海沸狂瀾黄本立東逰贈别楚邦才子燕臺客萬里還山復出山江漢摠歸滄海裏方蓬遙在白雲間将趨金馬陳三策却従樓船定八蠻逺道應能念林叟年年秋草映紫闗觀蘭室禪老山隂道中之作次韻二首吳山盡處越山多尚想經行野景和朝旭射巖晴卧鹿春泉落沼響驚鵞山人看竹敲門入溪女如花蕩槳過千里東逰何日再鏡湖明月醉中歌諸峰翠擁蘭亭勝稧飲嘗聞晉永和羽客喜邀仙子鶴野翁仍愛右軍鵞粉垣䕶竹家家似棕轎穿雲處處過最好晝眠松下石若耶溪上聽漁歌章孟忠和伍仲逺韻見寄再和答之王謝風流異俗徒清秋玉露映冰壺鴻飛碧落期髙舉鯨戰滄溟歎不虞松竹小堂兵後葺桂蘭香醑客来沽寄詩能憶雲中叟大隠墻東志自殊石門集巻四
