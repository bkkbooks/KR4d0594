body:
  text: 石門集卷一明梁寅撰古賦石渠閣賦丙寅江西試題維大漢甘露三年詔儲儒講五經同異於是名儒自蕭望之以下咸集於石渠閣聖上親稱制臨決五經學官至是始備諫議大夫臣褒竊睹陛下以戎狄賓服海內又安詔講經籍丕崇化本甚盛事也愚臣幸陪縉紳末議而學術謭陋不能窺要義折衆言至於著之賦頌以鋪張鴻休較其劣能亦僅可採竊惟石渠閣者乃藏書之府考論之地宜敷其事以彰徽猷謹拜手稽首而獻賦曰猗赫赫乎聖明之中興也化洽於九區二十有三祀重明揭乎日月茂德參乎天地慕商宗古訓之聞陋周宣大搜之事於是發睿斷詔羣儒啓金匱臨石渠卦爻窮其至賾謨誥訂其衆疑考風雅之辭義審儀制之等衰聖感麟而有作亦褒貶之宜稽蓋非閎碩之士無以核是非辨同異非髙敞之居無以儲篇籍列冠帶蔚乎盛哉信治朝之偉觀人文之巨麗也是閣也據神都之域冠未央之宫擬麒麟之壯抗天祿之雄酇侯設其矩班匠呈其功峻齊山嶽巧若鬼神俯壓坤軸仰支穹旻凌埃堁而危跱儼飛翬以孤鶱狀嶵嵬而菌層勢轇轕而雲屯架杏梁之夭矯刻芝栭以叢攢掀觚稜之鳯翅燦雕甍之龍文璇題照日以皓曜珠網蒙霧以紛綸迎朝霞而納夕照際河漢而邇星辰其中則玲瓏綺疏璘㻞列錢若總章之牖户其傍則便娟曲室窈窱間宇若閟宫之廣邃環而為渠則端若引繩深若川池微波龍鱗藻荇參差露浟浟之鰋鯉散泛泛之鳬鷖甃以密石則堅比膠漆瑩類圭璧上廉鋒削下址鐵積象峭壁之將將亘周除之滌滌若乃夷道縰屬朱扉洞開車騎絡繹於兹往來閲其編簡則􅀈於秦灰之餘侈於孔壁之舊先王之策府莫之尚焉聆其辨説則可否五味之濟倡和八音之諧帝廷之吁俞無以異焉於是天子乃備法駕乘次輅樹翠華之旗駕蒼龍之駟公卿庶僚雲滃飈戾濟濟之臣于于之士下逮羽林之兒帶劍之夫靡不森立而駢羅奉簡以進協於帝衷臣向臣勝為夔為龍凡在搢紳咨諏是同訓必明夫聖之義義必揆夫道之中蓋以其一日之論紹乎千載之宗是豈不足以示來裔而耀無窮也哉凡觀聽之士莫不心醉奧旨辭贊懿德暢若春熙疑若冰釋乃為之頌曰石渠之闢以演聖澤流泱泱兮阿閣與侔祥鳯斯集烜陽光兮日月久照列星咸麗皇文昌兮前聖之啓後聖之嗣胠閟藏兮恩被湛露化周仁風覃萬方兮典章炳煥鴻業綿邈垂無疆兮群臣於是洋洋歡洽再拜而退咸願紀述昭於世世蒙山賦蒙山者吾州之峻嶽也然郡志僅傳名不逺著禹貢言蔡蒙旅平則梁州之境魯頌言奄有龜蒙則東海之地而史記之注又曰老萊子楚人躬耕蒙山之陽今考周之季世魯併於楚龜蒙屬焉而吾州亦楚域也又安知老萊之隱不在於吾土乎余家於是山之陽瞻神秀之異慕賢哲之風遂為之賦其詞曰維堪輿之奠位斯山嶽之肇形類波濤之激蕩擁泥沙之崚嶒為嶠為岑或丘或陵尊若帝王陪以公卿然人也以山而鍾秀山也因人而著稱在於荒陬雖崇而隱邇乎雄都雖卑而名竊愛夫蒙嶺之鎮吾地其於終南少室天台會稽何彼重而此輕也哉觀其勢雄千仞根盤百里嵯峨嶔崟蜿蟺峛崺竅以諸洞界以衆水巘崿鱗鱗崖石齒齒疆域之標郡國之紀皂嶂東回春臺西峙鼇峰北聳渝流南迤其為寶藏則白金之璀璨碧鈿之璘㻞表炎方之竒産充天府之上珍其為靈蹤則金剎據其陽仙巖在其巔森祗樹於翠谷閟小有於洞天若乃瑤草掬芳珠林挺秀風篁球戛煙蘿帷覆蘭茝緣於徑畈芝术産乎嵌竇長隂澗之茯苓絢霜林之橘柚猿猱哀嘯熊羆怒咆霧卧文豹湫吟黑蚪揚夜鶴之遙音露秋鶻之懸巢過客眩於妖狐樵子駴乎山魈凡其根荄之品飛走之族時榮時悴以涵以育富於靈囿之駢羅夥於陸海之儲蓄博物之張華無以辨其類洽聞之郭璞曷能究其目宜夫絶俗貞士離世潛夫恱雲霞而長往與麋鹿以為徒玩岡葩之春媚樂岑木之夏敷吟素秋於月觀度玄冬於雪廬坐紫苔兮緑綺奏蔭蒼松兮藝帙舒或茹芝兮白日晏或掃葉兮涼飈隨想夫楚叟之賢栖山之陽躬尚稼穡志輕侯王觀山泉之泓渟悟蒙養之端莊愜間情於濬壑杜妄轡於巖廊嗟軒堯其既逺顧沮溺其可望勵雅操之氷玉謝溷世之粃粳疑斯人之或逺復東瞻乎魯邦既異世以同趣宜隨地而安常吾將稅俗駕屏塵心企潁陽懷箕隂朝與山兮為儔夕與山兮相尋濯纓松下流振衣雲中岑寧抱甕以自勞賦歸來而長吟厯萬里於至近返千齡於方今庶永托於兹山嗣髙賢之徽音石門集卷一
