body:
  text: 石門集巻七明梁寅撰序送李行簡序六經惟春秋以書事而寓王法往往多微旨非有所授受罕能灼知其意者漢儒以明經致通顯大儒若賈生董仲舒劉向父子皆春秋之學故至今通是經者比易詩書禮記尤多名之曰大經夫經豈有大小哉以其旨之微而說之者襍非究心之久莫能窺其義明其用故尊而異之而以大之名加之也今朝廷以五經取士業春秋者亦多居上第安成李君濂行簡舉于鄉以春秋冠江西之士及再舉遂登進士第授豫章郡錄事人謂豫章大郡錄事劇任君必不屑意而君之来也慨然以政自勵未嘗憚於煩自分省大臣及部使郡守諸參佐凡事有可疑必咨于君曰是能以春秋决事者耆老庶民亦相戒毋為非理曰是能以春秋措諸政者郡之俊髦與逺方之學者又皆以君為師法曰是能以春秋訓後進者士之窮經必以致用豈空言也哉君秩滿且去在官者事無所諮訪民失其所煦嫗俊秀之士恥從于他師無不欲君之留而莫之遂也然君方以盛名達中朝其進要職享豐祿将如崇臺之階而升也其再至於是郡也士民之喜又當何如哉寅寓豫章辱君知尤深故因其門人朱昻之請述諸君子之意而為之序送張繼先北上序夫禮之難其人久矣非其有忠信之質荘敬之心孰能好人之所不好而致力於是哉漢興獨河間獻王志於禮樂之事當其時所得禮書猶存古經篇七十記百三十一篇然既藏之秘府在廷之臣莫之尚也天下之士莫之見也其立之學官而僅傳習者髙堂生之士禮而已小戴之傳記而已若大戴記之學則寥寥無聞周官經雖存亦久之稍顯盖禮學之難也今朝置明經科於三禮惟用小戴記而業乎是者方之他經僅什之一二甚或缺焉而不以貢可歎也夫金陵張繼先為性明敏而立志勤確獨深好小戴之學不惟誦習其說而且匔匔然惟禮之是守豈非所謂忠信之質而有荘敬之心者哉繼先初受業豫章徐君元善而復咨其義于余余於五經皆泛觀其傳註非顓門者也然賴繼先相切磋自豫章至金陵踰嵗常朝夕論辨其互滋益為多焉繼先以其父調官京師宜隨侍又将詣國學以受業於博士江公其不息之志尤可尚也而以三年之共學乃有萬里之别余可無一言以為之朂哉夫禮之習也非惟善其身又當推之以化民成俗斯可也今天子治化恢張廟堂之臣必有志河間之志者倘聞下明詔集禮官諸生議明堂修郊祀考廟祧興庠序協音律定章服凡草野逢掖之士孰不忻忻愉愉而願覩帝王之盛哉而繼先于是時或得以所學與于縉紳之議亦何愧也記曰安上治民莫善于禮又曰致禮樂之道舉而措之天下無難矣吾将于繼先之行也而觀之崔照磨審獄詩後序君子之蒞官行政以循其職分非蘄人之知也然實之既孚而名自隨小者既試而大可必觀賢能之道盖在于是焉南臺掾崔君文翼前為江西憲司照磨嘗代其上官審郡縣獄能持法平允宅心忠恕驅馳朝夕不避煩苦於是公道彰明美譽流播歌頌之聲遐邇相應詎非賢能之效哉至正九年秋寅始識君于金陵既而君俾其壻陶温受經于寅一日出詩文一巻則皆美其審獄囚而獲名譽者也寅誦之歎曰甚哉執法之臣不可以不慎也夫閭閻之間山谷之内民之蠢蠢者弱脅於强愚困於黠廉遜於貪仁屈於暴鄉抑之則必之於縣而直焉縣抑之則必之於郡而直焉郡抑之則又必之於憲司而直焉居憲司者能正郡縣之失達小民之枉然後為無負于天子之法矣而豈易能也哉茍無道以照之則志雖為民而民不蒙惠者葢多矣是以君子惟學之為貴也夫純鈎湛盧天下之利器也然不磨淬之於平日而欲以剸犀象刳蛟鼉則鉛刀之不異今君歴佐風紀而文學法律靡不通練焉譬之利器其磨淬之久矣宜其少試之而恢恢其有餘也然則以是而居大任决大疑扶綱立紀進善退惡固無往而不可也而豈獨刑獄之間哉凡奉簡執筆之士見善必錄是亦其職也詩文摠若干篇而虞學士歐陽憲使為之首君之才行見信于先達於是又可見云送國學生吕允亮序京師有國子之學所以教貴胄而成俊乂也夫璆琳崑崙之産也而圭璋取焉孤桐嶧山之材也而琴瑟資焉公卿大夫士之為時而出者非教之有其地曷能以周其用哉濟寧郡守吕侯之子公直字允亮既膺博士弟子員之選復以父命来婚于金陵因謁余郡庠晬然其容必禮之式確然其詞惟義是陳余固占其外而知其中也未幾復来請曰國學群材之林也而吾幸托處以覬有立焉昔許文正公之興學也其時英才之萃道化之行翕然雲從沛然川流而吾曽大父文穆公實髙第弟子後遂為名臣吾何敢不思跋而及之哉今吾父由中臺御史出為部使者之副天子方思安元元尤重牧守故吾父復任郡寄恒孜孜焉以圗報稱吾又何敢不以父之心為心哉夫以門廕仕志士之羞也吾将以博士弟子試有司而取進士第其功必倍然後可覬也吾又何敢不自勵而後于同輩哉今還京師以肄故業道之云逺見之良難子幸有以規我余因謝曰吾何以規於公子哉以公子之世美而進于通顯如物之取于寄宜無不得也雖然學必有師師必有道親師惟賢嚮道惟正夫師許公以淑後進者國子先生之心也而期無愧于前人者在公子之自勉而已矣吾何以規于公子哉瞻萬里之行持一言之贈姑以述愛敬之意云贈黄伯恒序旴江士黄伯恒客于建業於其將歸也其鄉友饒仲允為之請曰伯恒好修而端慤者也其為學師孔孟而兼通乎和扁之術其出也将以歴觀山川詢其人才而審其風俗及其久也則又思學之貴于反求而親戚之違鄉井之棄亦古賢之所譏也願子惠之一言以美其歸焉余因語之曰今閭閻荘壹之士所嫚笑者必曰妄逰而逰豈盡妄也哉夫士之出處其猶山之泉乎泉之出不能不行也而其行必以漸或瀦焉或駚焉或瀠洄焉或激怒焉其勢則然爾昔之時九土分裂州各異其國國各有其禁然游者且猶務于逺東之齊也而復西之秦北之燕矣而復南之粤其所厯說者顧其學之正不爾不以逰為非也矧今天下為一雖四海萬里猶比居也逰奚不可哉雖然吾因伯恒之歸又将語之以退息之樂焉凡今之嗜利祿者其不得焉則戚既得焉則喜得之而復失則喜也而復戚戚而喜喜而戚何不恒之甚也而伯恒豈為是哉今而歸也必将拜親于庭㑹友于鄉刲羊釀酒以道契濶而遂息其驅馳安于恬淡日誦書讀詩以涵泳太平之澤詠歌山林之志視世之欣戚渙然如太虚之浮雲不知其孰為而聚孰為而散孰為而有孰為而無處之為樂不甚于逰之為樂乎余留滯建業之久固倦逰者也而伯恒乃能先余以歸夫豈不快然哉群俊饑之名章繼作故因仲允之請而序其意且以朂伯恒之歸慎勿膠于外物而累其心也贈儒醫羅誠之序余讀太史公書常羨秦越人淳于意皆以一技之神而傳之史與功臣烈士同炳燿于後世夫史以志天下之事者也而尤惓惓于醫方意深矣哉葢所以重生民之命示擇術之要義固當也而余于羅君誠之之善醫也亦有取焉誠之廬陵之儒者也嘗以明經三試有司不一得遂絶意名祿而隠于醫其誦醫之言也如誦聖人之經平居閉户湛思㝠索寒暑不廢晝夜不懈久之逰金陵譽以大著諸公貴人率多敬信之金陵郡文學博淵泉為人强力氣盛素少疾一日忽痿痺瘖眩如風雨之驟至亟曰為吾召誠之誠之至語其家人曰毋懼吾於是證得其方尤秘而功尤速者也是夕投以善劑即少甦次日而腕可轉移三日能坐立五日能杖而盤旋旬有五日能出入一月而復常如所料不失也夫醫者死生之寄也於人之危疾宜懼矣而獨能不懼者非輕人之生死也其中素定也譬之千斛之舟凌不測之淵波濤卒起而蛟鯨怒戰衆皆為之膽墮而津人獨以無懼出其險者亦其中之素定爾誠之之於醫豈妄庸比哉淵泉之疾既差其子弟諸生請叙誠之之績余雖不能如太史氏専筆削而誠之之力追古人則固可嘉也故樂為之書噫為其事必有其功獨醫乎哉誠之之用心尤足以為學者之勸也王謹諭右江蠻序後至元二年秋廣西右江獠岑世興反冦南寧等郡其子郎罕攻定逺諸寨衆合十餘萬殺長吏置偽官詔江西省平章圖嚕黙色哈雅湖廣省平章諾海合兵討之次年春兩軍闕州命江西省宣使王謹往諭賊謹度崑崙關歴宣化慕化觸豺虎犯毒瘴地俱險極道遇賊騎呵曰爾誰也乃敢入吾地謹應曰吾使者諭岑耳汝等無状是自速禍也遂過之至果化州賊将趙擁衆逼之謹諭之如前久乃退至上林縣賊圍之十數匝或登山白其魁来曰速下馬解刀往見将軍不則死謹厲聲曰我天使也岑氏反今討逆之師屯栁矣愍爾曹無罪死故令我来諭使知天子之仁若妄殺我是真反也大軍至爾曹無噍類矣復還白其魁乃已謹道渴飲而脹咳吐便旋皆血懣卧樹下從者磨馬檳榔汁以椰杯注口中久乃蘇力疾抵大江江廣數里云烏龍支派也無舟楫束衣捽馬鬉渡之是日不得食夜宿巖穴旦達功饒州民數家鳥言以鈔市食弗得解衣以易乃得之至田州世子長子特穆爾方閲兵聞之報其父世興盛兵出迎騎萬餘步卒倍之館謹于順龍州謹責世興曰天之所覆者地皆王地民皆王民汝恃逺為亂天子震怒命二宰臣将兵五十萬誅汝不盡勦不已汝能悔過則轉禍為福即不能恐烏合非敵首領不保矣世興曰前舒穆嚕萬户傳詔吾未之順今汝来彼教汝以紿我耶吾有死而已汝勿言也謹曰前之不順命罪也今能順是奉前詔也能奉詔則無罪矣世興疑未决謹復曰始入而地謂而世據此土民不知有朝廷矣及見而父子則知其不然何也我之来也汝兵欲殺我者數矣聞為天使輒斂刃以退夫欲殺者盡汝之道也知使者而退猶畏朝廷也汝世荷大恩而反倔强獨不愧汝之愚民乎今服罪而出汝福無窮不則禍立至人皆知之而汝獨不察何也今師㑹于栁誓辭曰能殺其渠帥来降者授其位夫富貴人所欲也汝不思自保一旦變生肘腋恐兵不血刃汝之位已歸他人矣世興乃悟曰我嵠夷耳不識是非利害以至于此罪不容誅惟天使善為我言而寛宥之遂皆免冠拜堦下謹曰若然歸侵地反俘獲詣大軍聴命有他虞者使人任之世興曰諾四月七日以世興父子至栁州平章命世興子特穆爾與其黨十三人朝京師遣世興還乃班師錫宴平章坐謹於賓位觴之曰宣使能靖一方之亂可謂不戰屈人兵者也於是侑以銀盌一幣一帛一兩省上其功天子嘉之授従仕郎桂陽藍山縣尹以報功也嗚呼使以專對為能者也然往往多貪欲或易以屈撓故功不能立由利害之心勝也今謹忠義自持無所趨避其頰舌之效踰于鈇鉞之威真賢使也哉謹字彦信濟寧任城人其治藍山尤多善政御史商企翁為序其績求諸名士之歌詠余偉其事故錄之石門集巻七
