body:
  text: 石門集巻六明梁寅撰記醴溪記醴溪在蒙山之陽十五里其南北皆連山水貫流其中北山之西曰堵山其次曰菰峰又次曰紫雲峰其下為靈峰寺正北有三峰森立尤竒秀其東曰神峰吳将軍之祠在焉又東有岡迴抱曰鍊岡其南山之西曰石門兩峰對峙巨石如虎蹲其次曰大金峰金峰而下綿亘若屏然至其盡處與鍊岡對中有圎阜突出水上兩山銜之若龍之爭珠者居人名之曰珠堆當石門之下為松池泉出其間竇如井者三四其味最甘釀之以為酒醇釅異於常以為糜雖白粲而上凝赤色食之若飴葢泉之尤美者也其下流為演溪迤東注溉田可五六十頃居溪之陽凡百餘家而為吳姓者十之八九世耕且學多淳質少衰靡故不徙其業不輕去其鄉予家在菰峰之陽松溪之上曽大父由分宜之湖澤臺而徙于是里之名舊曰裏收長老相傳云里之田極膏腴嵗常豐收故古以是名而其為士者或名之曰裏溪予以溪之泉甘如醴故又更名醴溪云嘗觀夫民戴仁而履義負隂而抱陽其生一也而其水土之異則質性亦殊是以君子慎其習焉吾里之俗淳厚且多秀異之士固地氣然也使居是里者父飭其子長率其幼去紛華之尚守勤儉之規革狂悖之性崇禮遜之美以是溪為仁里而人皆有士行顧不係于習哉吾将見後来之才俊益多而地靈之所鍾未艾也故記其山水之槩以示里之子弟使知有所本且有所勵是亦善風俗之意哉瓊華石記瓊華石者石之堅白而竒異者也曹南吳君主一寓於洪名其室曰好古人或遺之以是石君珍而寘之室外因名瓊華云予暇日過之見是石巻然雄峙髙僅咫尺蘭芷青青交映可愛君因取置之几間其為質如𤣥圃良玉温潤自然其為状如雪山嶄巖望之凜慄扣之聲鏗然則又如天球之戛而清越殊於衆音也予因賀之曰昔人謂珠玉無足而徧中原者以人好之也今是石也産于隂崖沍谷之中漸水泉貫地脉嘘雲霧膠冰雪不知其幾千百年也而一旦出焉以為君之玩然則好賢而賢至豈異是哉况君子比徳于玉石玉類也追之琢之濡之拭之進徳之道也名之曰瓊華則石而玉矣君之寳之也亦宜哉吳君喜曰斯不可以不記於是為記之且以傳于好事者使知君之志非徒曰玩好而已也君方以廕仕而好學不倦工為詩尤善分隷掲侍講為作隷書行好古齋銘虞侍書作也商卣記昇張氏君寳家藏商卣一卣尊之異名也凡尊彜為上罍為下而卣為中其容可五升宗廟以盛秬鬯盖貴重之而異其用也今定以為商器者稽其制辨其文視其色而已按博古圖宋内府藏商䕫龍卣三其二有葢有提梁其一提梁葢俱無而形如瓠然今張氏卣正與瓠形者同非商之制與又其文皆靁状中為饕餮面饕餮惡獸也而貪者象焉文以是者懲貪也為靁者古之器多雲雷雲變化而雷震動也其銘二字一字肖人形似為子字一字尤竒古莫識也按商器銘子孫字多為人形而手或持戈㦸刀匕之類辨者曰商子姓故多子字曰子孫者傳之子孫也又商之世質故銘簡周彌文故銘備今銘止二字則商之銘也辨者又曰凡器年彌久者色温潤如碧玉斑斑然如朱砂翡翠今卣亦然為商器益明矣夫自商至今三千餘年矣而其器猶存可貴哉凡器形也大而天地日月皆形也則亦器也而其運則亘乎古今雖不能不窮于十二萬九千六百年之後而器之久者孰能過之也賈子賦曰天地為罏造化為工隂陽為炭萬物為銅今卣之制人也非造化也鍊之者火也非隂陽也金三品之下也非萬物也而其久于世也能與天地日月同厯幾千萬寒暑晦朔何哉其殆神工製之而神物又従而䕶之邪抑譬人之夀夭其數然邪是未可知也張氏世文雅君寳之先君贈秘書典簿號石城先生蓄古器物圗畫甚富而君之兄弟尤篤好于是及獲是卣則以為尤異者也至正己丑嵗其仲兄君濟館予以訓諸子因觀是卣而為之記嗟夫器之可珍者或藏于山或閟于淵或雖出民間而視之猶瓦缶者固多矣今是器也獨見珍于好事者之家而余亦得以文辭托之為不朽余又因以賀是器之遇也三秀亭記神仙之流貴于保形鍊氣凝情養神故所栖必山澤之地水木之間重樓邃宇虚亭閒館而清異之氣毓為珍木竒草或稱有琅玕之樹金莖之華丹木之實五色之芝殆亦神靈之感與丹陽之歸真觀昉于東晉焦真人觀有堂名曰希夷堂之後可百步有亭曰三秀三秀者靈芝之異稱也相傳云昔有芝生于是故以名亭也亭燬于宋季而賴名人之賦咏猶在至正七年鍊師諸葛若洤始重構之亭之四面為池而跨池為梁浮波之魚翔風之禽與人狎近池之外則叢篁連翠鉅木交柯隂雲晝生寒氣憀慄逺之所望則東有具區西有句曲而其後為白鶴之溪清流遥映衆岫互出如登閬風憩𤣥圃而與神人者逰也亭之中不蓄異玩而張以圗誡充以載籍師或逍遙来游與群弟子上論開闢下觀萬象客至具脯棗醴醪従容懽洽弟子陳知常善鼓琴或命之為蓬莱之音時時更倡迭和賦五七言詩然亦非人間語也知常既謁趙御史子威求篆書之額復因其宗兄時舉屬余記之予謂天地之間凡有形者必歸于無夫三秀者神異之産也故仙者好之或采焉或茹焉或歌焉然登斯亭者欲觀其赤如珊瑚白如截肪黒如澤漆青如翠羽黄如紫金果有乎無也是其名宜托之亭而後久也雖然亭不可久也而恃名以久名不可久也而恃言以久而言也果可以久乎其所以久者先天地而無始後天地而無終非形也而不離于形也非言也而不外於言也彼煌煌之五色者不得而見矣而因亭以久者其不在于人也夫請以是諮之鍊師因以為是亭之記河源記古今河源之說異禹貢云導河自積石未窮其源也漢張騫云河有兩源一出于闐一出葱嶺唐薛元鼎云得河源于崐崘盖皆傳聞者山海經言崑崙之水赤黄黒青色以方異穆天子傳言陽紆之山河伯所居是為河宗佛書言阿耨逹山有大淵水即崑崙也其山名往往不同者或古今變易或番漢異稱不然記者之妄耳按潘侍讀昻霄河源志今朝之究河源盖得之目覩非傳聞者也太祖嘗征西夏過沙陀至黄河九渡九渡者在崑崙西南憲宗命皇弟旭烈征西域凡六年拓地四萬里而河源在域内矣至元庚辰世祖命都爾蘇往西域将城其地以通互市自河州行五千里抵河源及還圗城郭位置以聞上恱以為吐蕃都元帥領工徒以往使其弟庫庫楚馳奏大臣沮之次年還河源在吐蕃西鄙有泉百餘竇地方七八十里皆沮洳不勝人跡泉不可逼觀登其旁嶺下視泉竇厯厯如列星然故名鄂端諾爾鄂端者漢言星宿也諾爾者海也星宿海合流而東滙為二澤復合流始名黄河然猶清可涉河析為九即九渡也廣五七里下復合流漸逺水益渾土人抱革􅇸騎過之其聚落之處多編木如舟以濟附以毛革中僅容二人又東則兩山峽束廣可一二里或半里深叵測矣崑崙腹頂皆雪盛夏不消河過其南距山麓僅五六十里又南為四達之衝地多盜常鎮以兵崑崙之西人民少山居其南山峻獸有旄牛野馬狼狍獂羊之屬東則山益峻而地漸下岸至狹或狐可躍度河至貴徳州始有官治厯積石至河州東北流厯蘭州鳴沙州應吉里州流正東自星宿海至漢地河南北小水旁注者衆其山或草或石至積石始林木暢茂世言河九曲而彼地有二折云漢書言葱嶺河至蒲昌海水洑流而出臨洮今洮水自南下非蒲昌也土人言于闐葱嶺水下流散之沙磧則其洑流信然然其複出者莫知矣或又云黄河與天通又云崑崙去嵩髙五萬里閬風𤣥圃積瑶華葢仙人所居皆妄也世多言河出崑崙者盖自積石而上望之若源于是矣而不知星宿之源在崑崙之西北東流過山之南然後折而抵山之東北其遶山之三面如玦焉實非源于是山也然凡水者山之血脉也山髙而廣則其水必衆而鉅崑崙至髙廣者也而謂無一水源于其間耶其不言之者葢欲破昔之謬著今之竒故略之爾延祐中庫庫楚為翰林承旨潘侍讀與同僚故得其言如是余喜其詳而信因述之以資多考云思齊齋記友人王仲義名其藏修之室曰思齊而訪余郡城之南求訂其義余因諗之曰子之思齊于賢秉彜之心也取友之道也自勵之方也然賢豈一端乎士之工文辭者句必雕琢音必諧叶以成乎一藝斯賢矣然可以昭其譽未足以美其躬也豈齊於是而已乎有孜孜焉於學術究人之所未究知人之所未知斯賢矣然可以博其識未足以成其行也豈齊於是而已乎為一鄉之善士矜其小廉狥其小信明于止足確于自守斯賢矣然可以持其躬未能以𢎞其道也豈齊于是而已乎若夫君子者其徳非一喜其行非一能處則藴諸身出則濟天下斯則所謂大賢者也吾之齊于是足矣然猶曰未也既齊今之賢尤必齊古之賢可也孟子曰尚論古之人周子曰志伊尹之志學顔子之學能如是可以無愧于為人矣而亦非踰乎性者也雖然将齊乎賢尤重於思師而思事之友而思親之古之人而思效之朝思于是夕思于是人之善即吾之善也斯能齊之矣師也而恥事焉友也而恥親焉古之人而自謂不能焉斯不思之甚人之善非吾之善也其烏能齊之也哉仲義曰善請書以為齋之記仲義名友仁居清江之西鄙與予為執友将十年明程朱氏易兼工於詩文為人端恪不惑于世俗不急于進取余以為可與共學者故為之書貞固軒記傅氏世居官溪之陽號為多才俊其尤挺出者曰元賓元賓之避地而歸也闢荆榛畚瓦礫搆小堂六楹其西室啟窗南鄉植梅二株余嘉其息馳逐而樂栖遯為名其室曰貞固且告之曰貞言其正固言其堅四徳之終於以起元天畀於人在物亦然故人之徳而梅有之當夫風霜凌厲冰雪凝沍葉辭其條液歸其根而梅於是時紛然珠綴皭然玉潔郁郁烈烈芬芬苾苾松與為儔竹與為列貞固之性孰逾之哉人之性至純也至粹也靈于物而或反愧于物以物之全其天而人自離之也故其酷于冰雪者世紛也苛于風霜者憂患也衆之蚩蚩徇于所嗜屈于所畏孰明而貞孰執而固君子者内志弗移外好弗入處險以夷處悶以樂既貞既固惟金惟石梅之是侣孰謂人而不物之若耶嗟夫元賓朂之哉人之所惡者寒也而天不輟其冬人之所慮者險也而地不改其形其好為洶洶者小人也而君子不易其行元賓謝曰處軒之中誦梅之賦宋公是師永保貞固敢不拜教哉元賓於予為婣屬且少従予學善為詩歌兼習草𨽻而尤喜寫墨梅是軒之名亦所以著其好也寳藝齋記世稱𤣥圃之玉麗水之金南海之象犀明珠凡致之難而見之罕者是皆寳也至于五禮六樂五射五御六書九數下迨辭章之習伎能之工則皆藝也然人之好尚莫得而兼也故寳之蓄也多富而藝之博也多貧士生于時思以益其知識而異于凡庸則藝者至理之寓也故寧舎彼而取此焉是則寳之尤貴而大者也余之友生吳僉子亮志于藝文治一室而藏修其中余為名之曰寳藝欲其寳夫士之寳而不徒寳夫衆人之寳也其居于是室也闃然以虚湛然以靜方之華軒廣庭重裀累席罍爵金玉百玩錯陳樂以羌羯歌以鄭衛彼固足樂矣而吾反觀之則聖言醇醪也道義大胾也美行金璧也誦聲絲竹也吾朝而潛心夕而凝神左圗右書前箴後規目與寳接心與寳隨吾心之樂果何待於外物之樂也况世之寳者人得而與則亦得而奪吾以吾寳養吾之性性具乎心行成於身孰得而奪之乎所寳若是雖萬鍾之富五鼎之貴吾不以易矣子亮従余受春秋當不用之時而為待用之學是其習於藝尤為知本者余故為之記俾寘之坐隅庶乎其有儆焉恕齋記髙君如心名其講肄之室曰恕齋而以書囑余記之余為之論其世叙其善然後明恕之義焉論其世者何也嘗聞諸故老髙氏之族世居烏山與黄氏聨婣黄之里曰鵠山族蕃以著由學而仕代有其人髙氏雖緜延僅存然亦多業于儒而不愧其先斯為可稱矣其所謂善者何也今之人當夫搶攘之世惡之稔而泯焉者衆矣而能居其居者豈不難乎居之因於敝陋者衆矣而能治其庭除潔其奥室不尤難乎能治其居者亦有矣而能以仁義為文繡以禮法為凖繩若髙君之名其室者不愈難乎斯又其可尚者矣名之以恕者何也夫忠為體而恕為用恕也者忠之發也以已及物為仁而推已及物為恕恕也者仁之方也因己之心度人之心知人之心如己之心斯為恕矣恕之道既得則近而家族逺而四海夫孰非吾之度内哉吾聖人以為終身可行者宜也嗟夫髙君之為心又非徒儆乎一已而耀乎一時者也将使其家之子若孫居是齋之中而皆能務古人之學勵君子之行則所以振髙氏之業者其在兹乎其在兹乎請以是言書之壁間以為進修之勸凝室記余為草堂于石門之下菰峰之陽其中室南嚮而虚明日晏坐于是以觀萬物之理以稽千載之故愛是室之能佚余而不受夫世好之汨也因字之曰凝室或覩而笑之以為怪則従而析之曰凝之言定也聚也成也在古有訓曰凝于道徳之修也曰凝于神志之顓也觀是室之前肇于鴻蒙而成于富媪者山之凝也疏于開闢而瀦為囦池者水之凝也雨露以萌之風霜以堅之篁木之凝也巖谷以洩之叢翳以結之雲靄之凝也當舒霽之時臯隰光華而巘崿綺麗陽暉之凝也吾頤性乎吾室閲元而貞察作而復其外廓然以寂而其中夷然以寧凡世之得若失也榮若辱也忻若戚也歌若呻也登若墜也抗若抑也槩乎勿以滓吾之靈臺吾事吾天君五官效職百為順序群邪退黜至正黙守譬之寥寥之鄉老而休者遨遊嬉戲状如小兒於市井之紛華郡庭之共㑹恬然而莫知也斯非所謂凝其志而逃其累者乎或曰凝子之志其槁木矣夫其石人矣夫曰動非無静静為動本静非無動動為静應子周子曰定之以中正仁義而主静吾之凝其志主乎静焉爾而謂其能不動也哉余既以是記之墻間将求書其額於劉君仲修而懼其亦以為疑也故又錄以告之寒泉琴記清江蕭氏徳章蓄古琴三一曰玲瓏玉一曰廣寒秋而其曰寒泉者乃其最所珍愛者也徳章之舅氏新昌胡君鼎實號𤣥陽先生博物君子也少壮時久宦留燕都縉紳多與之逰迨今朝徵用為上賓館大使君精于數學解音律而尤好琴時時以鼓琴侍上上甚重焉及奉詔求賢南粤道過清江以寒泉之琴遺徳章余比嘗過之出示其三琴因拂拭寒泉為余鼓杏壇之操余雖不解音而聽之洋洋然知其聲之清妙而其製之異于今人也余嘗謂琴之見重于君子者非徒以其鏗鏘而已也葢琴與瑟配異于衆樂而列之堂上其聲平和而非怨悲也其調雅淡而非繁促也其曲皆祖乎聖賢以之寫心暢情而非荒耽俚鄙之辭也故善琴者必其人之心體廣大志慮冲逺皭然于塵滓之外超然于聲利之表故其本之于心發之于指莫非大音之妙也舜之解慍阜財文王之處險如夷仲尼之樂天知命皆藉是物以陶其憂思而已爾余在京師聞之趙翰林之孫彦禎曰吾大父有松雪之號者盖其所珍之琴曰松雪故以名齋也今徳章愛是琴亦将結茅為亭於其堂之後而鼓琴其中于以養心于以娱客若然者非惟曰彰舅氏之賜也盖心得其養則衆欲不萌萬物不干欲為賢人君子此其一助也因為之歌曰寒泉兮泠泠韶濩之遺兮澗谷之聲寒泉兮瑟瑟以潔吾心兮以浴吾徳山中朝夕兮惟泉之聞手揮七絃兮目睇白雲心悠然兮寡所親空桑奏兮遐思乎古人夫古之所謂琴曲者亦莫非目之所觸心之所感形之辭而著之聲也徳章于為學之暇静處之時心如泉渟慮若冰釋必有以復見文王尼父者盍於是而得之石門集卷六
