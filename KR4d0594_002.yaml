body:
  text: 石門集卷二明梁寅撰五言古體詩歸醴溪久厭都市喧俯思山巖靜歸飲醴溪泉怡我淳朴性神峯雜樹蓊石門翠崖並蘿懸晨露滋巘秀夕霞映攀陟諧樵牧候謁悔奔競褰裾䕃雲松脫屣悅風磴悠然遁客心疊出野人詠方期谷口耕毋誚終南徑送辜德中㑹試寫我山澤言送君雲霄舉貴人氣每驕下士心獨苦紛紛競科第口吐聖賢語朝出原憲室夕與王侯伍我視辜賢良懷珠類良賈乃知淳厚士不獨在齊魯松柏生澗岡出為明堂柱雖言被丹漆赤心若可覩既應綸言徵將隨玉階步嵯峨黃金臺望君為延竚和楊逸人桃林遷居之作心寂忘塵嚻時清樂巖築愛此桃華林葺之杜蘅屋葛籬延芳藟石梁照淺淥風翔雙白鳥雨卧一黃犢東臯雜婦子中野見樵牧賦詩雲霞塢㩦壺錦繡谷從君以優游於此謝羈束題西山程氏南窗獨居南窗靜秋木連翠岑鳴琴衆葉下把酒孤猿吟寧負朱紱願莫乖白雲心羡彼歸田叟髙風留至今為臨川章則常題山水圗山擁衡廬青水含瀟湘碧兩崖蟠蛟樹千嵗蹲虎石遙遙遡川舟泛泛蹇驢客憑髙者何人閒看楚雲白題印土寺罷釣軒曲池照林塢百尺懸蘿隂開軒坐埀釣水清如我心小魚易傷生大魚或淵沈投竿為之惻於此悔悟深名區縻好爵都市爭黃金但戀鉤餌馨豈知憂患侵濯足南澗流振衣北山岑既羞結網罟何必溉釡􅑄物生免相賊嗜欲常自禁嘉此古人意托之金石音城中女娥娥城中女小樓對門家相驕茜裙新並笑雙鬟斜花窗弄鸚鵡月榭彈琵琶不自結衣帶笑人說絲麻越女當自羞燕姬何足誇但愁玉顔改眼底生塵沙秋江芙蓉落天寒空怨嗟擬古十二首獨處衡門下慨然思九州我馬苦疲怯山川多阻修豐草被長坂麋鹿或羣逰蔚彼嘉樹隂鳴禽自相求彼物各有適而我何寡儔日月雙車輪但恐不少留願與二三友朝夕論王猷毋為自局促窮廬悲白頭出門望長道車馬何闐闐白日殷輕雷飛塵若為煙周人好商賈錐刀爭貿遷趙女夸綺服跕屣彈鳴絃營營苦不足衣食思華鮮奔濤日東注何由為靜淵南州産嘉橘朱實日光炫燕晉誇棗栗連林極豐羡棗栗充餱􅀈足以飢餒咽橘酸良不如亦可籩豆薦踰淮或成枳性移貴反賤賢哉鍾儀子土風慎不變名都少年子金多矜富强連雲起甲第峨峨擬侯王外廏駢騏驥侍女羅姬姜豪貴相經過綺席飛瓊觴醉言氣凌人歡樂殊未央嘲笑東鄰士晏食惟糟糠豔豔桃李花隨時逞妍芳豈知易零落榮華安可常鳯栖必孤桐鶴集思髙松飛翔擇所止羞與鷦鷯同踽踽賤貧士混混常俗中節槩曾閔賢言語班揚工被服常布褐虛室生蒿蓬向非賢哲舉何以樹勳庸芙蓉在江浦亭亭豔清波雖云出淤泥麗質良可嘉褰裳涉枉渚凌風折芳花願言贈君子玩之比瑤華於時茍不惜憔悴當奈何時違骨肉棄位髙仇怨親離合心豈常勢利情所因君子羞薄俗古風恐夷泯深知慕管鮑輕怨羞張陳蕙荃不隨化球琳豈易磷結交英雄士白首當如新江海處卑下百川皆赴之山木鬱蕭森上竦無繁枝王侯稱孤寡惟恐嬰菑危謹虛受衆益天道盈必虧周公下白屋吐哺情孜孜孫子相强楚祿豐心愈卑奈何閭閻子往往多矜持昔常好名山五嶽期遍歷思見松與喬再拜問仙液微生纍妻子常為飢凍役歎此血肉軀何以生羽翼諒非金石同服食竟何益不如安我常百年任所適雲門輟清響鄭衛音方揚錦衣受垢汙不如練布良軒軒青雲士鳴玉升廟堂名髙受讒毁寵盛罹愆殃美女惡女仇偏聽姦以萌衆口能鑠金况乃忘周防所以君子心惟用德自將行行九折阪戒哉銜橛傷驅馬出東郭松林見髙墳云是公侯葬華表干層雲嵗月既已逺朽石生荆榛虺蛇或內蟄狐狸當晝蹲生者歌其上死者寧復聞感此長太息浮生若飈塵惟當朂令德千載逝猶存我有太古琴千載妙音續七絃何泠泠聽之非促遫一彈文王操再彈宣父曲聖人宛見之何由躡其躅大道日以淪澆詭馳衆欲孰思障頺波九州返淳俗䕫龍為股肱巢許遁巖谷窮通各有志于我奚不足雞鳴雞鳴九街曙喧喧多市聲馬似隂雲度塵隨紅日生自非守貧者何以免營營歸息歸息蒙嶺陽聊比嵩少岑樂此林藪趣遂忘江海心沿澗搴芳藟入谷聽幽禽流泉響松下潺湲非俗音猗蘭被徑傍香氣襲衣襟頺景忽西匿浮雲夕以隂眷彼羣飛鳥翩翩投北林藹藹巖前樹翠葉敷鮮滋攢葩雜丹素條蔓相因依豐草覆側徑麋鹿或羣隨石潭見逰倏玩之往復來念昔困羈紲山澤心每違傍巖葺茅茨庶使夙願諧黃綺各有志淡然何是非春陽既和煦時雨亦霑濡原野緑已遍土潤含膏腴兵戈幸少戢良農日墾鋤戴勝鳴桑林鶗鴂亦交呼嗟我理編簡四體忘勤劬羔裘愧逍遙梁鵜恥安居素餐古所誚偶耕良我徒食蕨薇蕨生固殊類同若兄弟夷齊昔茹薇蕨亦吾所嗜味非駝峰美味非熊掌異但慕夷齊風嗜此心不愧茅堂新成素匪廊廟器林栖心所怡雪蹊愛竹柏雲疃結茅茨牽蘿幾晨夕休工及春時樂與二三友敦好在書詩種樹循遺法輪鞅息妄馳緋桃傍欄吐碧草當階滋散帙對陽景鳴禽集芳枝時眺薺麥墟或臨樵牧岐逃喧慮自屏抱拙淡無為賢哉考槃子遐慕長在斯和答周繼文鮮鮮籬中槿朝開夕旋落菊生叢莽間嚴霜耀衆萼所以君子交常使情誼渥鳴禽思蔚林縱魚慕濬壑雅趣固其然庸俗詎能度咏歌有遺音絲竹非至樂來轅慰幽屏返斾望冥漠重期琚瑀臨豈歎雲漢邈簡伯英伯筠見訪雨留信宿溪谷雲晝合東林微雨來二友歘俱至一見紓中懷掃我茅茨室為君緗帙開上言風雅醇下言豔歌諧何以相淹留清醑不盈杯何以為逺贈愧無瓊與瑰煦風失堅氷溪水流湝湝歸鴻正翺翔浮鷖散參差告我遽言旋定省恆懼乖懿此孝友心令德善自培願為王國士無愧北山萊暇日過吳僉子亮寶藝齊偶賦長安繁華子錦綺為衣裾千金歐冶劍百金大秦珠腰帶玉麒麟馬鞭青珊瑚鬬雞杜陵曲走馬黃山隅一朝歘自厭謝遣輕儇徒出市賣駿馬下帷事詩書落筆慕班揚開口論唐虞既膺丞相薦詔徵詣公車三十祕書郎四十諫大夫不登金張門掉臂許史廬結知萬乘主入侍九重居里閭共嗟歎金玉竟何須六藝信為寶少年毋自疏舍後觀泉閒窺石峽泉折竹掃苔翳稍覺魚鳥親亦使蛇蟲辟濯纓寒襲人洗硯香生臂西崦雲晝冥佇聽風雨至歌行李辰州黑首白身名馬歌李侯名馬姿相别赤騮紫燕俱下列頭純黑色身遍白一片隂雲兼積雪自言辰州初買時城門走試驚飈馳少年旁觀皆歎息前者未聞今見之矯如𤣥龍躍春水巨浪掀騰玉鱗起夜將金絡光可覩晝鞲銀鞍色相似東還豫章今幾載黃金可市當十倍長鳴冀北羣已空出獵隂山意常在吁嗟李侯才更賢虬鬚燕頷神凛然明年踏雪趨幽燕青霄飛鞚朝九天九重詔拜大都護此馬願逐雙旌去題蒙谷子圗蒙古氏托音字正已自號蒙谷子家于隨州為人豪邁衣冠仍本俗而所守方介讀書談道恬然自樂至正初與臨江杜本等四人皆以處士徵托音授集賢待制至燕京以大臣之禮貌未盡竟不受而歸揭太史為作蒙谷子傳其門生陳士文為江西省掾以其圗求賦之漢川之東美山水誰其隱者蒙谷子草屋披書橡櫟隂奚童携琴篁竹裏彈冠曾拜大夫爵洗耳竟作箕山士願隨鸞鵠凌烟霄寧使蛟龍在泥滓嗟哉世士多尚同嗟哉日凋淳朴風長安車馬若流水安得一來空谷中送貢士顔子中北庭貴胄多才華厯厯科名映前後吾觀子中何俊拔龍駒鳯雛世稀有春秋三傳在胸臆煜煜文光動星斗縱橫健筆刀矟利白晝翕忽風雷吼髙名前嵗上春官同儕先登顔愈厚今日再貢尤神竒詞場馳騁誇捷手嚴徐可備顧問列卓魯能知風化首君才內外無不宜漢廷幾人出君右野夫有志徒激烈年踰四十棲壠畝丈夫勳名山嶽重常願賢豪慎操守江頭送君朔風急鴻飛翩翩沙石走白頭喜托青雲交他日幽思在林藪題王維所畫孟浩然像孟君故人好事者摩詰當年號瀟灑薦之明主既不能綵筆徒誇善描寫滻川風急天正寒灞橋雲黃雪初下蹇驢行行欲何之妙句直欲追大雅飯顆山頭杜少陵溧陽水濱孟東野飢寒一身人共歎聲名千載天所假南山故廬拂袖歸五侯七貴俱土苴龍鍾如此君莫嘲平生貴在知我寡遊鍾山至正己丑春清明前二日重逰鍾山從行者友生金陵張復先奉先髙昌拜特穆爾金陵喻詢張士安及子岷始由寺後觀寶公塔憩崇禧小苑登惟秀亭望大江臺城久之歷擁翠亭飲八功德泉既而小酌松下分韻賦詩用又得浮生半日閒為韻而以長少為次豫賦又字十韻為之倡鍾山舊逰經十載佳辰今喜登臨又清明况與數友同春濃更覺諸峯秀紺殿觚稜隱𤣥霧閟宫幡幢昏白晝古松尚訝龍屈蟠怪石還疑鹿逗遛偶逐樵人繭足趨驚逢老僧雪眉覆郁郁天花百和香泠泠風篁七絃奏東崖西崖絢金碧前林後林開錦繡捫蘿或如啼猿抱下坂急若流星走少年兼戒埀堂險素心默借神靈佑名山共閲太史書思傍精廬卜雲構題李文甫泉石軒繡衣御史才且賢江南策馬將朝天金閨蘭臺名藉甚清泉白石心恬然華軒嵯峨崇臺側九曲之溪北山北雪瀑泠泠六月寒雲根屹屹千年色御史拜官本書生射策天門羣輩驚致身已羡鍾鼎食詠古猶聞金石聲坐談時接林下士馳想巖阿紉薜荔方膺鈞軸未許閒且以泉石醒煩思泉流赴海石在山丈夫雄豪那可攀何妨勳業霄漢上長寄心情林壑間袁孝子篇海陵袁道濟為鹽丁貼户其父為富豪所陵轢死非命道濟茹哀廬墓三載山東張緝為之作傳前御史趙侯子威尹於是州復為上其事侯之子致本學於余因請賦之袁孝子思死如生生欲死海鹽場上淚眼枯哀心無窮海之水誰云猛虎凶誰云長蛇毒咄爾凶毒人何獨無骨肉爾身雖虀斷腸已裂我腹父也銜寃螻蟻鄉兒猶飲食被服裳皇天昭昭運三光如山之罪胡可以掩藏暑卧埃塵寒卧雪霜躍我前狐嘷我傍父魂有知兒共處母存未忍兒身亡嗚呼天下幾人寃且苦孝子三年獨廬墓官書大字表門户更願除却人間蛇與虎金陵美酒行余在金陵郡庠白推官子京餉酒二壺云鍾山僧所釀風味殊常余素不飲不能知也因客至酌之果以為佳遂賦此金陵美酒人共誇千金百金多酒家緑印青瓶若山積粉書綵幟明春花北來南去多豪客吳歌趙舞當綺席銀鐺苾苾松脂香玉舟灧灧鵝黃色奈何徼利翻賤價虛名誑人妄稱詫惟將衆藥助麯糵澆薄每異真淳者鍾山老僧釀山泉醍醐甘露美自然壺樽惟餉朱門貴升斗豈論青銅錢書生病渴嘗涓滴始因酒味知酒德市樓醉客徒喧呼山中醇醪人不識送御史椽王德潤遷中臺二月東風來江南花正開行人發建業逺赴黃金臺金臺到時已三月燕山青青罷飛雪看花正似江南春黃鸝迎人語音恱繡衣郎官文采竒海霞照耀珊瑚枝天街栁緑驄馬嘶朝隨御史趨彤墀彤墀花暖風日美御史俯伏天顔喜千言萬言氣凜然能令奸邪愧欲死郎官家本東魯人十年讀書泗水濱當陪東馬嚴徐貴不假金張許史親上林年年春自好拜官却憶江南道江南望君驄馬來方信文章致身早題孫仲逺經厯萱夀堂豪家甲第開錦繡春來牡丹大如斗孫卿獨愛萱草花玩之忘憂期母夀官中無事常早歸花前跪進青玉巵此花本號宜男草食祿封侯男更宜去年花開滿堂後今年堂後花似舊綺窗朱户閬苑深毋與此花共長久九節菖蒲何處生千年碧桃種不成卿家萱草良可貴人間自當五百嵗琴中趣贈上饒危逸人問君琴中趣好在山水間山風吹雨木蕭瑟山月照石泉潺湲五音低昻宫徵變紫鸞和鳴白鶴怨空桑既逺鄭衛繁筝琶之耳誰能辨五栁先生好素琴君今仍愛絃上音邈哉古音傳古意更請為問雍門子老將行小年自詫良家子手把兵書當經史出身名𨽻羽林籍帶劍橫行過都市一校初蒙上將知三軍盡羡好男兒隂山夜寒雪擁甲沙磧晝昏風捲旗鐵驄疾足若飛兔羽箭鳴聲如餓鴟獨攻賢王每血戰生擒當户猶窮追自矜虓勇世無敵九重竟未承顔色上功幕府屢呵譴獻計轅門多沮抑大將軍印别賜人狼居胥山誰勒石鬭雞羞入少年場射虎猶令獵徒惜方今天子重書生朝臨廣內暮承明老來不願風塵起但向閭閻觀太平紫騮馬效楊伯謙紫騮馬黃金鞭春風十里杏花發髯奴鞲馬瓊樓前樓中美人坐歎息飛塵一帶出南陌南陌行人如水流怕郎騎馬好逺逰贈吳孟任君不見漢時定逺侯恥事筆硯心雄豪赤手能扼昆山虎釣竿竟掣青海鼇吳郎讀書思用世縱談王霸誼甚髙旁窺風雅兼楚騷酒酣氣欲隘八極有時拔劒起舞白日風蕭颾亘空虹霓歘而見深谷魍魎為之逃一身膽氣山崒嵂英姿何必頭虎毛時時過我論六韜後生可畏心所褒驊騮豈憚踏冰雪鷹隼早見辭籠絛臯䕫稷契日已逺達官肉食多淫叨焉知吳郎心激烈褐衣在野輕爾曹我常愛君如寶刀用之有時慎所操用之有時慎所操丈夫事業非徒勞篢谷作老樹山橋晝瀟灑興來濯足蒼藤下雲邊崖石危欲落雨後泉流急如瀉客過松林貪翠隂農分稻苗散青把桃源風土良可樂何恨龍鍾在田野題墨溪橋橋在黃花里張氏黃氏居其側庚子之嵗張莘思尹從余學請賦之黃花之髙峰削玉凌青霄墨溪如苔峽曲折架以螮蝀百尺之飛橋乃有逸人張與黃結廬其側相與放曠而逍遙園綺非陋漢巢由豈忘堯吾但愛此清泠水濯纓鼓枻夕復朝虎溪松風鳴石竅香爐烟彩騰山椒恍然若在匡廬下雲入衣袖神飄飄溪流可鑑分妍蚩照之誰云白為緇教兒兼學王右軍日以墨溪供墨池豈無題橋磊砢士訪隱蹀躞溪之湄拂石橫琴瞰流咏詩明月自至如相與期或時臨風酌醽醁醉眠蒼苔歌紫芝紫芝歌罷心自怡遐聣六合間何物勞我思蔓草緑靡靡亂石白離離游魚不復驚狎鷗能我隨共談留侯黃石事人生樂在心相知題郡城歐陽氏草堂桃源或藏朝市間草堂那厭近江關門外馬若流星過壺中人似洞仙閒異人曾見陶𢎞景詞客常交庾子山書和藥塵香郁郁席霑花片繡斑斑斑斑花逐春風起愛君詞章亦如此逸思朝凌葛岫雲清心夕比蛟潭水白􅎷蒼松詩近仙巨澤名山畫為史絶俗應同三島間結茅何必千巖裏巗裏烟雲如滿襟凡情日淺道自深不向南山歌白石何須北斗並黃金春天逺羡壺尊樂夜月徒搖旌斾心龍唇古琴懷古操為君一寫澗泉音石門集卷二
