body:
  text: 石門集巻五明梁寅撰七言拗體為李朝陽題松雲圗澗上小亭雙石磐古松四五雲巑岏横琴坐愛白日静散髮長疑朱夏寒汎汎輕隂過峭壁微微香粉落冰盤我欲同君覔幽處醉卧瑤席臨風湍贈西山僧髙僧自喜巖下住長見白雲飛復迴中天風動松子落千嵗石作蓮花開鳥下林堂待分食龍游溪水遇浮杯吳山楚山聊暫往還把楞伽歸去来贈白師禹省親安慶因就試河南白郎楚楚闗中豪讀書江南心獨勞露凉松寺寫周易日莫蘭叢歌楚騷家近千峰淮甸翠舟乘三月大江濤鍾陵秋晚正相憶好趂天風連巨鼇丙子嵗舟發豫章将往金陵常年九日歸不得今年九日重逺行秋水蒹葭自可愛故園松菊非無情月下飛鴻過别渚天明孤鶴唳髙城相将一棹望湖去即看匡廬嵐翠生題赤水霞栖圗四明陳常時夏父為吾州文學常隨侍繪其所居山水之勝曰赤水霞栖及東歸訪余於洪求賦之故人家居赤水上二百八十峰嵯峨明霞時混金碧氣老樹盡變珊瑚柯題詩石壁照松籟讀書茅亭懸女蘿道成不用金膏術飛向九霄鳴玉珂贈安福州尹王義方歸平陽安成使君廊廟器六年琴鶴寄山城草生齋閤少人迹花映訟堂聞鳥鳴勸農已報江南政柱史當馳天上名一舸秋風暫歸去太行千仞翠崢嶸題湛溪黄氏引翠樓徵君結樓湛溪上日日鈎簾看翠微長松雲際蛟龍起叠嶂天邊鸞鶴飛巫峽錦屏增秀色仙人瑤瑟帶清暉把書更覺秋意早冉冉浮嵐飄夕霏七言長律送江西省照磨王健志剛考試湖廣八月秋深江水清月明朱艦趂宵征郎官湖上風雲合黄鶴樓前洲渚生持鑑棘闈方伯召揚旌沙路郡侯迎經通魯史春秋奥策問周官禮樂明十八科名資化筆三千才子服英聲玉生𤣥圃珪璋就金出棠谿鼎鼐成放榜摠稱唐陸贄著書尤羨漢張衡名區三載承知遇聊采芙蓉寄逺情朱尚質挽詩尚質明春秋工詩文年三十六卒子夢炎辛夘進士魏亭之北朱賢良三十文章逼漢唐矯矯雲龍行碧落飄飄天馬脫絲韁山罍犧象珠凡器蒼玉珠璣多異光太史遺書窺石室春秋大義揭王綱方馳健步今文苑未策竒勲古戰場才似賈生誰敢忌名班黄憲遽先傷嚴君痛失鵷鸞羽令弟哀思鴻雁行悵望斗牛鋪紫氣嗚呼蘭桂隕秋霜故人秉筆争稱述稚子應門待振揚鸞草琅玕明月照新墳夏屋白雲長臨江孤客懐疇昔今日生芻空自将七言絶句龍翔寺贈縫人蜀綺吳綾慣揣量并刀常帶色絲香自言多得豪家意也解穿雲到上方山客麻衣嵗月多朔風吹裂奈愁何若為訪我清江上倩子雲中製芰荷贈采詩方道成乾坤清氣治朝音碧海明珠價萬金他日江南方氏集流傳應遣到雞林西湖歌五首美人玉釵燕翩翩白日照耀黄金蟬栁絲綠讓雲鬟嚲荷花紅妬茜裙鮮鵞黄滿壺載船頭酒能解愁人自愁長堤車馬如流水朝来莫去幾時休艷籹緩歌金縷衣舞腰學得鴈兒飛湖西日落月東出歌舞留人且莫歸青山入湖湖水青菱花白白照船櫺山頭急雨船須住水面凉風酒易醒錢塘城中十萬家碧瓦龍鱗户綺霞樓頭賣酒船中飲不如湖上最繁華兒子岷自維揚還至金陵得朱縣尹仲文手書且云荷接引良厚二絶寄謝時仲文将調官京師假館維揚木犀香裏設離筵建業西風八月天一騎仍留大江北雙鳬何日五雲邊一札飛来雲錦函也知能共阿戎談幾夜石頭城上月遙瞻二十四橋南釣臺三首臺下澄江山影多臺上蟠木懸青蘿髙人一去山寂寂萬古明月照江波獨把漁竿烟雨中身嬰塵網與人同祇緣競慕終南捷愈覺髙名泰華雄祠庭纔拜先生像舟子乘風發棹忙欲薦蘋蘩慚草草迴瞻雲水白蒼蒼觀清江傅氏西園題詠懐舊二絶憶昔西園曾見招春風歌響入春霄池上題詩花冉冉林邊歸騎雨瀟瀟一别桃源迷故津花隨流水幾回春烟塵豈料逢今日翰墨猶期似昔人聞笛風入梧桐山月明卧聽鄰笛轉凄清未傳黄鶴樓中曲却得羌兒塞上聲食笋楚山春笋楚江魚北野黄羊恐未如老来更厭江魚美食笋山中樂有餘足疾作山上浮雲坐卧看茅衡十日步蹣跚思仙不得飛騰術愈覺人間行路難為王仲義題雪梅小橋東郭先生履曲徑西湖處士家向暖早看花似雪冒寒更愛雪如花清江道中幾夜江城厭鼓鼙出闗那得更遲遲雞豚曉日田家樂榛莽秋風過客悲桕葉生紅霞映水荍花連白雪盈疇晴天繡畫山溪景却是春光不似秋寄章齊髙葛嶺雲開青映天瀟洲月上夜無烟太守愛居山水郡名流尤羨幕官賢去年相親情戀戀今年相望思依依石潭遥想蛟龍穏寒渚空憐鴻雁稀令弟曾為五臺客經過湖上問平安芙蓉道逺何堪寄楊栁秋来折更難山中嵗月薜蘿春天上光華印綬新白首惟思逢世泰青雲那得厭交貧山舎偶成石峽瑽琤新漲水柏林崷崪古時墳黄茅小逕無来客一犬松邊吠白雲代贈李以洪歸洪州門外梧桐啼早鴉行人策馬踏江沙歸去却憐家是客重来還念客為家冉冉花明金鳯渚青青栁映木蘭船遙望鍾陵在何處洪崖髙出白雲邊象牙潭裏帆過後石頭渡口船到時洲人洲上迎歸檝山客山中勞逺思黄峯岧嶤凌紫虚下有林堂宜讀書綠壑丹崖遲君至松巢不減住匡廬和何彦正春耕十一首見說春耕溪水頭賦詩猶憶玉京逰莫誇塞北千蹄馬寧買江南十角牛雨後逍遥南澗上山田漠漠樹重重綠拖烟外無窮水青揷天邊不盡峰埀埀楊栁䕃柴扃逺逺巖巒列錦屛江海歸来更何事朝親農圃夕窮經石壁臨流浄可書從教漁子怪癯儒黄蜂日日粘紅蕊白鳥時時下綠蕪自著青簔久離羣羞将龍劍逺従軍雨苗已得隣人惜烟草常令稚子耘亂後江湖阻舟楫衣冠强半寓山村雲山紫蕨那堪采豺虎驚人翠谷昏短笠登山自種茶縈林石徑樹邊邪百金自可侔封邑千騎何勞擁鼓笳竹間樵逕行應熟花外漁舟望欲迷處處稻畦分落照荷鍬人去水禽啼閒與山氓日共談往来溪北又溪南今代勸農賢太守他年何武定才堪野夫卧對石門山懐友其如道險艱喜誦清詩凉雨後喚回幽思白雲間業桑樹邊綠草坐刺桐花下碧甆杯醉和農歌樂農暇吳鹽如雪㸃楊梅石門集巻五
